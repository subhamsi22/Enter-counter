<!DOCTYPE html>
<html>

<head>
    <title>My Extension</title>
</head>
<style>
    body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        padding: 20px;
        text-align: center;
    }

    h2 {
        color: #333;
    }

    p {
        font-size: 24px;
        font-weight: bold;
        text-transform: capitalize;
        color: #e91e63;
    }

    #count {
        font-size: 24px;
        font-weight: bold;
        text-transform: capitalize;
        color: #e91e63;
    }

    #para {
        font-size: 24px;
        font-weight: bold;
        text-transform: capitalize;
        color: #e91e63;
    }

    button {
        padding: 10px 20px;
        font-size: 20px;
        font-weight: bold;
        text-transform: capitalize;
        color: #e91e63;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }
</style>

<body>
    <h2>Hello Welcome</h2>
    <p id="para">press enter to count </p>

    <p id="count">0</p>
    <button id="btn">Reset</button>

    <script src="popup.js"></script>
</body>

</html>
